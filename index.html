<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haptic Sense Console</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HapticSense">
    <link rel="apple-touch-icon" href="./logo.png">
    <link rel="manifest" href="./manifest.json">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #020306;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #E2E8F0;
            overflow: hidden;
        }

        .device-container {
            width: 100%;
            max-width: 440px;
            height: 100vh;
            max-height: 920px;
            background-color: #04050E;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0, 240, 255, 0.15);
        }

        @supports (-webkit-touch-callout: none) {
            .device-container { height: -webkit-fill-available; }
        }

        .app-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            z-index: 10;
        }

        .app-stage.active { display: flex; }

        #ignition-unlock-screen {
            background: radial-gradient(circle at center, #0B112C 0%, #020306 100%);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: pointer;
        }

        .ignition-plate {
            text-align: center;
            padding: 30px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            background: rgba(0, 240, 255, 0.02);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1);
            border-radius: 8px;
            max-width: 80%;
        }

        .ignition-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #FFFFFF;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .ignition-subtitle {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #00F0FF;
            text-transform: uppercase;
        }

        #identity-screen {
            background: #04050E;
            padding: 40px;
            justify-content: center;
        }

        .premium-title {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 3px;
            color: #A0AEC0;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .minimal-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(0, 240, 255, 0.3);
            padding: 12px 4px;
            font-size: 22px;
            color: #FFFFFF;
            outline: none;
            margin-bottom: 60px;
        }

        .floating-action-btn {
            background: rgba(0, 240, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.3);
            padding: 16px;
            border-radius: 4px;
            color: #FFFFFF;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .floating-action-btn.ready {
            border-color: #00F0FF;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            background: rgba(0, 240, 255, 0.08);
        }

        #mode-select-screen {
            background: #04050E;
            padding: 40px 30px;
            justify-content: center;
        }

        .stack-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .tactical-plate {
            background-color: #0D1024;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tactical-plate.selected {
            border-color: #00F0FF;
            background-color: #121733;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .plate-label {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #console-dashboard { padding: 15px 20px 25px 20px; }

        .global-system-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .manual-back-trigger {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #718096;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .manual-back-trigger:active {
            border-color: #00F0FF;
            color: #00F0FF;
        }

        .status-pill {
            background-color: rgba(0, 240, 255, 0.06);
            border: 1px solid rgba(0, 240, 255, 0.3);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #00F0FF;
            text-transform: uppercase;
        }

        .mode-selector-track {
            background-color: #0D1024;
            border-radius: 30px;
            padding: 4px;
            display: flex;
            position: relative;
            margin-bottom: 25px;
        }

        .track-tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #718096;
            z-index: 2;
            cursor: pointer;
            text-transform: uppercase;
        }

        .track-tab.active { color: #FFFFFF; }

        .frosted-slider-pill {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(33.33% - 5px);
            height: calc(100% - 8px);
            background: rgba(0, 240, 255, 0.2);
            border: 1px solid #00F0FF;
            border-radius: 26px;
            z-index: 1;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .mode-module {
            display: none;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .mode-module.active { display: flex; }

        .sensory-card {
            background-color: #0D1024;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 15px;
        }

        .map-trigger-plate {
            background-color: #0D1024;
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 6px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .map-trigger-plate:active {
            border-color: #00F0FF;
            background-color: rgba(0, 240, 255, 0.02);
        }

        .map-trigger-label {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #00F0FF;
            text-transform: uppercase;
        }

        .map-wrapper-box {
            width: 100%;
            height: 300px; 
            border-radius: 6px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            overflow: hidden;
            position: relative;
            display: none; 
            transition: all 0.3s ease;
        }

        .map-wrapper-box.visible { display: block; }

        .map-wrapper-box.fullscreen-active {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            max-width: 440px;
            z-index: 99999 !important;
            border-radius: 0px !important;
        }

        #embedded-blind-map { width: 100%; height: 100%; background: #04050E; }

        .phrase-grid { display: flex; flex-direction: column; gap: 10px; }
        .phrase-capsule {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px;
            border-radius: 6px;
            color: #E2E8F0;
            font-size: 12px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
        }

        .assistant-portal-anchor {
            position: absolute;
            bottom: 100px; 
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 999;
            pointer-events: none;
        }

        .aura-ring-portal {
            width: 76px;
            height: 76px;
            border: 3px solid #00F0FF;
            border-radius: 50%;
            background-color: #04050E;
            background-image: url('./logo.png'); 
            background-size: 85% 85%;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .aura-ring-portal:active { transform: scale(0.9); }
        .aura-ring-portal.speaking { animation: voiceGlow 0.4s infinite alternate; }

        @keyframes voiceGlow {
            0% { box-shadow: 0 0 10px rgba(0, 240, 255, 0.4); border-color: #00F0FF; }
            100% { box-shadow: 0 0 30px rgba(255, 255, 255, 0.8); border-color: #FFFFFF; }
        }

        .portal-caption {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #00F0FF;
            text-transform: uppercase;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="device-container">

        <div id="ignition-unlock-screen" class="app-stage active">
            <div class="ignition-plate">
                <h1 class="ignition-title">Haptic Sense</h1>
                <p class="ignition-subtitle">Tap Screen To Start</p>
            </div>
        </div>

        <div id="identity-screen" class="app-stage">
            <h2 class="premium-title">Initialize System Profile</h2>
            <input type="text" id="username-field" class="minimal-input" placeholder="SPEAK OR TYPE NAME" autocomplete="off">
            <button id="submit-name-btn" class="floating-action-btn">Continue Identification</button>
        </div>

        <div id="mode-select-screen" class="app-stage">
            <h2 class="premium-title" style="margin-bottom:20px; text-align:center;">Select Interface Mode</h2>
            <div class="stack-container">
                <div class="tactical-plate selected" data-mode="blind"><div class="plate-label">1. Blind Mode</div></div>
                <div class="tactical-plate" data-mode="deaf"><div class="plate-label">2. Deaf Mode</div></div>
                <div class="tactical-plate" data-mode="dumb"><div class="plate-label">3. Dumb Mode</div></div>
            </div>
            <button id="initialize-engine-btn" class="floating-action-btn ready">Initialize Core Engine</button>
        </div>

        <div id="console-dashboard" class="app-stage">
            <div class="global-system-header">
                <button class="manual-back-trigger" id="hardware-back-btn">← Back to Menu</button>
                <div class="status-pill">Active</div>
            </div>

            <div class="mode-selector-track">
                <div class="frosted-slider-pill" id="slider-pill"></div>
                <div class="track-tab active" data-target="blind">Blind</div>
                <div class="track-tab" data-target="deaf">Deaf</div>
                <div class="track-tab" data-target="dumb">Dumb</div>
            </div>

            <div id="module-blind" class="mode-module active">
                <div class="map-trigger-plate" id="manual-map-load-btn">
                    <div class="map-trigger-label">🗺️ Load Navigation Map</div>
                </div>
                <div class="map-wrapper-box" id="map-click-enclosure">
                    <div id="embedded-blind-map"></div>
                </div>
            </div>

            <div id="module-deaf" class="mode-module">
                <div class="sensory-card" style="text-align:center; padding: 40px 10px; color:#EF4444; font-weight:700;">ENVIRONMENT MONITOR ACTIVE</div>
            </div>

            <div id="module-dumb" class="mode-module">
                <div class="phrase-grid">
                    <button class="phrase-capsule" data-phrase="Emergency status active. Requesting immediate assistance.">Emergency Assistance Broadcast</button>
                    <button class="phrase-capsule" data-phrase="Clear the path forward. System navigation bypass required.">Request Clearance Path</button>
                </div>
            </div>
        </div>

        <div class="assistant-portal-anchor">
            <div class="aura-ring-portal" id="voice-portal"></div>
            <div class="portal-caption" id="portal-status-text">SYSTEM STANDBY</div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const state = {
            name: "Operator",
            mode: "blind",
            isMapFullscreen: false,
            mapInstance: null,
            recognition: null,
            audioPipelineUnlocked: false
        };

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                
                utterance.pitch = 0.50; 
                utterance.rate = 0.82; 
                utterance.volume = 1.0;

                const voices = window.speechSynthesis.getVoices();
                const deepMaleVoice = voices.find(v => 
                    v.name.toLowerCase().includes('google uk english male') || 
                    v.name.toLowerCase().includes('david') || 
                    v.name.toLowerCase().includes('microsoft david') ||
                    v.name.toLowerCase().includes('male')
                );
                if (deepMaleVoice) utterance.voice = deepMaleVoice;

                utterance.onstart = () => {
                    document.getElementById('voice-portal').classList.add('speaking');
                    document.getElementById('portal-status-text').innerText = "BROADCASTING";
                    if (state.recognition) { try { state.recognition.stop(); } catch(e){} }
                };

                utterance.onend = () => {
                    document.getElementById('voice-portal').classList.remove('speaking');
                    document.getElementById('portal-status-text').innerText = "LISTENING";
                    if (state.recognition) { try { state.recognition.start(); } catch(e){} }
                };

                window.speechSynthesis.speak(utterance);
            }
        }

        document.getElementById('ignition-unlock-screen').addEventListener('click', () => {
            state.audioPipelineUnlocked = true;
            document.getElementById('ignition-unlock-screen').classList.remove('active');
            document.getElementById('identity-screen').classList.add('active');
            
            speak("Welcome to Haptic Sense. Please speak or type your name.");
            initVoiceEarEngine();
            setupInputListeners();
            setupDashboardActions();
        });

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        function setupInputListeners() {
            const field = document.getElementById('username-field');
            const btn = document.getElementById('submit-name-btn');

            field.addEventListener('input', () => {
                if(field.value.trim().length > 0) btn.classList.add('ready');
            });

            btn.addEventListener('click', () => {
                if(field.value.trim().length > 0) proceedToModeSelection(field.value.trim());
            });
        }

        function proceedToModeSelection(nameInput) {
            state.name = nameInput;
            document.getElementById('identity-screen').classList.remove('active');
            document.getElementById('mode-select-screen').classList.add('active');
            speak(`Name logged. Welcome ${state.name}. Choose system interface mode.`);
        }

        function setupDashboardActions() {
            const plates = document.querySelectorAll('.tactical-plate');
            plates.forEach(p => {
                p.addEventListener('click', () => {
                    plates.forEach(pl => pl.classList.remove('selected'));
                    p.classList.add('selected');
                    state.mode = p.getAttribute('data-mode');
                    speak(`${state.mode} mode targeted.`);
                });
            });

            document.getElementById('initialize-engine-btn').addEventListener('click', () => {
                launchMainConsoleDashboard();
            });

            document.getElementById('hardware-back-btn').addEventListener('click', () => {
                executeReturnToHomeAction();
            });

            document.getElementById('manual-map-load-btn').addEventListener('click', () => {
                triggerMapLaunchWorkflow(false);
            });

            document.getElementById('map-click-enclosure').addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON' || e.target.closest('.leaflet-marker-icon')) return;
                toggleMapViewState();
            });

            document.querySelectorAll('.phrase-capsule').forEach(c => {
                c.addEventListener('click', () => speak(c.getAttribute('data-phrase')));
            });

            document.getElementById('voice-portal').addEventListener('click', () => {
                speak(`System check nominal. Console active under monitoring authorization of operator ${state.name}.`);
            });
        }

        function triggerMapLaunchWorkflow(isVoiceTrigger = false) {
            document.getElementById('manual-map-load-btn').style.display = 'none';
            
            const mapWrapper = document.getElementById('map-click-enclosure');
            mapWrapper.classList.add('visible');
            
            initMapLayer();

            if (isVoiceTrigger) {
                mapWrapper.classList.add('fullscreen-active');
                state.isMapFullscreen = true;
                speak("Initializing spatial tracking map layers now.");
            } else {
                speak("Mapping coordinates rendered successfully.");
            }
        }

        function executeReturnToHomeAction() {
            if (state.isMapFullscreen) toggleMapViewState();
            
            document.getElementById('map-click-enclosure').classList.remove('visible', 'fullscreen-active');
            document.getElementById('manual-map-load-btn').style.display = 'block';
            state.isMapFullscreen = false;

            document.getElementById('console-dashboard').classList.remove('active');
            document.getElementById('mode-select-screen').classList.add('active');
            speak("Returning to main mode selection interface panel.");
        }

        function launchMainConsoleDashboard() {
            document.getElementById('mode-select-screen').classList.remove('active');
            document.getElementById('console-dashboard').classList.add('active');
            syncTabs(state.mode);
            
            speak(`System fully initialized. Loading orientation matrix layouts.`);
        }

        function initMapLayer() {
            if (state.mapInstance) {
                setTimeout(() => state.mapInstance.invalidateSize(), 100);
                return;
            }
            state.mapInstance = L.map('embedded-blind-map', { zoomControl: false, attributionControl: false }).setView([17.6868, 83.2185], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(state.mapInstance);
            L.marker([17.6868, 83.2185]).addTo(state.mapInstance);
            setTimeout(() => state.mapInstance.invalidateSize(), 200);
        }

        function toggleMapViewState() {
            const el = document.getElementById('map-click-enclosure');
            state.isMapFullscreen = !state.isMapFullscreen;
            
            if(state.isMapFullscreen) {
                el.classList.add('fullscreen-active');
                speak("Welcome to Haptic Map. How can I help you?");
            } else {
                el.classList.remove('fullscreen-active');
                speak("Restoring standard console layout views.");
            }
            setTimeout(() => state.mapInstance.invalidateSize(), 350);
        }

        function initVoiceEarEngine() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return;

            const rec = new Speech();
            rec.continuous = true;
            rec.interimResults = false;
            rec.lang = 'en-US';

            rec.onresult = (e) => {
                const phrase = e.results[e.results.length - 1][0].transcript.toLowerCase().trim();
                console.log("Captured Phrase: " + phrase);

                if (phrase.includes("go to home page") || phrase.includes("go home") || phrase.includes("go back")) {
                    executeReturnToHomeAction();
                    return;
                }

                if(!document.getElementById('console-dashboard').classList.contains('active')) {
                    if(!phrase.includes("mode") && !phrase.includes("open")) {
                        document.getElementById('username-field').value = phrase.toUpperCase();
                        proceedToModeSelection(phrase);
                    }
                    return;
                }

                if(phrase.includes("blind") || phrase.includes("navigation")) {
                    state.mode = "blind";
                    launchMainConsoleDashboard();
                } else if(phrase.includes("deaf") || phrase.includes("alert")) {
                    state.mode = "deaf";
                    launchMainConsoleDashboard();
                } else if(phrase.includes("dumb") || phrase.includes("vocal")) {
                    state.mode = "dumb";
                    launchMainConsoleDashboard();
                } else if(phrase.includes("map") && state.mode === "blind") {
                    triggerMapLaunchWorkflow(true);
                } else {
                    speak(`I heard you say ${phrase}. Please instruct me to switch interface profiles, open maps, or go home.`);
                }
            };

            rec.onend = () => { if(!window.speechSynthesis.speaking) rec.start(); };
            state.recognition = rec;
        }

        function syncTabs(modeKey) {
            const indexMap = { 'blind': 0, 'deaf': 1, 'dumb': 2 };
            const idx = indexMap[modeKey];
            document.getElementById('slider-pill').style.transform = `translateX(${idx * 100}%)`;
            
            const tabs = document.querySelectorAll('.track-tab');
            tabs.forEach(t => t.classList.remove('active'));
            tabs[idx].classList.add('active');

            document.querySelectorAll('.mode-module').forEach(m => m.classList.remove('active'));
            document.getElementById(`module-${modeKey}`).classList.add('active');
        }
    </script>
</body>
</html>
