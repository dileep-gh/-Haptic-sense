<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haptic Sense</title>
    <!-- Leaflet CSS for mapping -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 🎨 Ultra-Premium Accessible Mobile Palette */
        :root {
            --bg-canvas: #070913;      /* Deep Midnight Space Obsidian */
            --bg-card: #111424;        /* Rich Slate Navy Blue */
            --border-crisp: #1E233D;    /* Solid Structural Border */
            --text-white: #FFFFFF;      /* Ultimate High Contrast White */
            --text-dim: #8E9BB0;       /* Highly Legible Muted Gray */
            --accent-royal: #2563EB;   /* Premium Command Blue */
            --accent-glow: rgba(37, 99, 235, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #020307;
            color: var(--text-white);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Smartphone Display Wrapper Layout */
        .app-container {
            width: 100%;
            max-width: 440px;
            height: 100vh;
            background-color: var(--bg-canvas);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (min-width: 440px) {
            .app-container {
                height: 850px;
                border-radius: 44px;
                border: 10px solid #1C1E2A;
                box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
                overflow: hidden;
            }
        }

        /* ⏱️ Phase 1: 2-Second Minimal Splash Screen */
        #splash-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-canvas);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-in-out, visibility 0.5s;
        }

        .splash-title {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: var(--text-white);
            opacity: 0;
            transform: scale(0.96);
            animation: clearFade 1.2s forwards cubic-bezier(0.16, 1, 0.3, 1) 0.2s;
        }

        @keyframes clearFade {
            to { opacity: 1; transform: scale(1); }
        }

        /* 📱 Phase 2: Premium Dashboard Layout */
        #dashboard {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            height: 100%;
        }

        header {
            text-align: center;
            margin: 20px 0 25px 0;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-white);
        }

        .scrollable-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 100px;
        }

        /* Premium Accessible High-Contrast Cards */
        .app-card {
            background-color: var(--bg-card);
            border: 2px solid var(--border-crisp);
            border-radius: 24px;
            padding: 22px;
            color: var(--text-white);
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: background-color 0.15s, transform 0.1s, border-color 0.15s;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
        }

        .app-card:active {
            transform: scale(0.97);
            background-color: var(--border-crisp);
        }

        /* Featured Layout Tile: Map View */
        #map-view-btn {
            border: 2px solid var(--accent-royal);
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.12) 0%, rgba(17, 20, 36, 1) 100%);
            padding: 28px 22px;
            box-shadow: 0 12px 24px var(--accent-glow);
        }

        .card-icon {
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid-row {
            display: flex;
            gap: 14px;
            width: 100%;
        }

        .grid-row .app-card {
            flex: 1;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            padding: 22px 10px;
            font-size: 1rem;
        }

        .grid-row .card-icon {
            font-size: 1.8rem;
            margin-bottom: 6px;
        }

        /* Center Sensory Visualizer Node (Fills Empty Space) */
        .visualizer-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            position: relative;
        }

        .sensory-pulse-ring {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px dashed rgba(37, 99, 235, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spinRing 20s linear infinite;
        }

        @keyframes spinRing {
            100% { transform: rotate(360deg); }
        }

        .sensory-core {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.2) 0%, rgba(7, 9, 19, 0) 70%);
            border: 2px solid var(--border-crisp);
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* Soundwave bar animation container */
        .soundwave-bars {
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0.4;
            transition: opacity 0.3s ease;
        }

        .soundwave-bars span {
            width: 3px;
            height: 15px;
            background-color: var(--accent-royal);
            border-radius: 10px;
        }

        /* Active listening animations */
        .listening-active .sensory-pulse-ring {
            border-color: rgba(220, 38, 38, 0.5);
            animation-duration: 4s;
        }

        .listening-active .sensory-core {
            background: radial-gradient(circle, rgba(220, 38, 38, 0.25) 0%, rgba(7, 9, 19, 0) 70%);
            border-color: #DC2626;
        }

        .listening-active .soundwave-bars {
            opacity: 1;
        }

        .listening-active .soundwave-bars span {
            background-color: #DC2626;
            animation: danceBar 0.6s ease infinite alternate;
        }

        .listening-active .soundwave-bars span:nth-child(2) { animation-delay: 0.15s; }
        .listening-active .soundwave-bars span:nth-child(3) { animation-delay: 0.3s; }
        .listening-active .soundwave-bars span:nth-child(4) { animation-delay: 0.45s; }

        @keyframes danceBar {
            0% { height: 10px; }
            100% { height: 35px; }
        }

        /* Modern Pill Status Bar */
        #status-pill-box {
            background-color: #0B0E1A;
            border: 1px solid var(--border-crisp);
            border-radius: 100px;
            padding: 12px 20px;
            font-size: 0.9rem;
            color: var(--text-dim);
            text-align: center;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #status-engine-dot {
            width: 8px;
            height: 8px;
            background-color: #10B981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #10B981;
        }

        /* Fixed Bottom Control Deck Panel */
        .bottom-dock {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 24px 30px 24px;
            background: linear-gradient(180deg, rgba(7, 9, 19, 0) 0%, rgba(7, 9, 19, 0.95) 40%, rgba(7, 9, 19, 1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #mic-orb-control {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background-color: var(--accent-royal);
            border: 3px solid var(--text-white);
            color: var(--text-white);
            font-size: 1.7rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            transition: transform 0.1s ease, background-color 0.2s;
        }

        #mic-orb-control:active {
            transform: scale(0.9);
        }

        #mic-orb-control.listening {
            background-color: #DC2626;
            border-color: var(--text-white);
            animation: voicePulse 1.3s infinite cubic-bezier(0.66, 0, 0, 1);
        }

        @keyframes voicePulse {
            to { box-shadow: 0 0 0 24px rgba(220, 38, 38, 0); }
        }

        /* 🗺️ Phase 3: Pure Immersive Edge-to-Edge Map Overlay */
        #map-overlay-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5000;
            background-color: #000;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
        }

        #map-overlay-view.active {
            transform: translateY(0);
            visibility: visible;
        }

        #map-element {
            width: 100%;
            height: 100%;
        }

        /* Floating Back/Exit Button Control */
        #exit-map-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 6000;
            background-color: rgba(7, 9, 19, 0.9);
            border: 2px solid var(--text-white);
            color: var(--text-white);
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <!-- Premium Mobile Shell Layout Container -->
    <div class="app-container">

        <!-- ⏱️ Phase 1: Logo Splash Screen Panel -->
        <div id="splash-screen">
            <div class="splash-title">HAPTIC SENSE</div>
        </div>

        <!-- 📱 Phase 2: Premium Dashboard UI Layout -->
        <div id="dashboard">
            <header>
                <h1>Haptic Sense</h1>
            </header>

            <div class="scrollable-content" id="dashboard-content">
                <!-- Custom Named Navigation Interface Tile -->
                <button class="app-card" id="map-view-btn" onclick="openMapView()">
                    <span class="card-icon">🗺️</span>
                    <span>MAP VIEW</span>
                </button>

                <div class="grid-row">
                    <button class="app-card" onclick="triggerProfileMode('blind')">
                        <span class="card-icon">🦯</span>
                        <span>BLIND MODE</span>
                    </button>
                    <button class="app-card" onclick="triggerProfileMode('deaf')">
                        <span class="card-icon">🧏</span>
                        <span>DEAF MODE</span>
                    </button>
                </div>

                <!-- Center Stage Visualizer Engine Asset -->
                <div class="visualizer-container" id="visualizer-node">
                    <div class="sensory-pulse-ring"></div>
                    <div class="sensory-core">
                        <div class="soundwave-bars">
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                </div>

                <!-- Sleek Telemetry Status Display -->
                <div id="status-pill-box">
                    <span id="status-engine-dot"></span>
                    <span id="status-display-text">System Engine Ready</span>
                </div>
            </div>

            <!-- Fixed Bottom Control Center Panel -->
            <div class="bottom-dock">
                <button id="mic-orb-control" onclick="handleMicToggle()">🎤</button>
            </div>
        </div>

        <!-- 🗺️ Phase 3: Immersive Edge-to-Edge Map Overlay -->
        <div id="map-overlay-view">
            <button id="exit-map-btn" onclick="closeMapView()">✕ Close</button>
            <div id="map-element"></div>
        </div>

    </div>

    <!-- Leaflet JS Map Engine Import Link -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let mapInstance = null;
        let speechRecognitionEngine = null;

        window.addEventListener('DOMContentLoaded', () => {
            const SpeechEngine = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechEngine) {
                speechRecognitionEngine = new SpeechEngine();
                speechRecognitionEngine.continuous = false;
                speechRecognitionEngine.lang = 'en-US';

                speechRecognitionEngine.onresult = (event) => {
                    const speechText = event.results[0][0].transcript;
                    updateLiveTelemetryStatus(`Heard: "${speechText}"`);
                    executeVoiceCommands(speechText);
                };

                speechRecognitionEngine.onerror = () => {
                    setVisualizerActive(false);
                    updateLiveTelemetryStatus("System Engine Ready");
                    document.getElementById('mic-orb-control').classList.remove('listening');
                };

                speechRecognitionEngine.onend = () => {
                    setVisualizerActive(false);
                    document.getElementById('mic-orb-control').classList.remove('listening');
                };
            }

            setTimeout(() => {
                const splashPanel = document.getElementById('splash-screen');
                const mainDashboard = document.getElementById('dashboard');
                
                splashPanel.style.opacity = '0';
                splashPanel.style.visibility = 'hidden';
                mainDashboard.style.opacity = '1';
                
                updateLiveTelemetryStatus("System Engine Ready");
                executePremiumVoiceWelcome();
            }, 2000);
        });

        function executePremiumVoiceWelcome() {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance("Welcome to the world of Haptic Sense.");
                const availableVoices = window.speechSynthesis.getVoices();
                
                const highQualityVoice = availableVoices.find(voice => 
                    voice.name.includes("Google US English") || 
                    voice.name.includes("Samantha") || 
                    voice.lang === "en-US"
                );
                
                if (highQualityVoice) utterance.voice = highQualityVoice;
                utterance.rate = 0.95;
                utterance.pitch = 1.0;
                
                window.speechSynthesis.speak(utterance);
            }
        }

        function playVocalResponse(textOutput) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(textOutput);
                utterance.rate = 0.95;
                window.speechSynthesis.speak(utterance);
            }
        }

        function updateLiveTelemetryStatus(statusText) {
            document.getElementById('status-display-text').innerText = statusText;
        }

        function setVisualizerActive(isActive) {
            const node = document.getElementById('visualizer-node');
            if (isActive) {
                node.classList.add('listening-active');
            } else {
                node.classList.remove('listening-active');
            }
        }

        function triggerProfileMode(selectedMode) {
            const formatAlert = `${selectedMode.toUpperCase()} MODE ACTIVATED`;
            updateLiveTelemetryStatus(formatAlert);
            playVocalResponse(formatAlert);
        }

        function openMapView() {
            const mapOverlay = document.getElementById('map-overlay-view');
            mapOverlay.classList.add('active');

            setTimeout(() => {
                if (!mapInstance) {
                    mapInstance = L.map('map-element', { zoomControl: false }).setView([17.6868, 83.2185], 14);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
                }
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((gpsData) => {
                        const latitude = gpsData.coords.latitude;
                        const longitude = gpsData.coords.longitude;
                        mapInstance.setView([latitude, longitude], 15);
                        L.marker([latitude, longitude]).addTo(mapInstance).bindPopup('Current Location').openPopup();
                    });
                }
            }, 400);
        }

        function closeMapView() {
            document.getElementById('map-overlay-view').classList.remove('active');
            updateLiveTelemetryStatus("System Engine Ready");
        }

        function handleMicToggle() {
            if (!speechRecognitionEngine) {
                updateLiveTelemetryStatus("Device profile speech unsupported.");
                return;
            }
            const micOrbControl = document.getElementById('mic-orb-control');
            if (micOrbControl.classList.contains('listening')) {
                speechRecognitionEngine.stop();
                setVisualizerActive(false);
            } else {
                micOrbControl.classList.add('listening');
                updateLiveTelemetryStatus("Listening...");
                setVisualizerActive(true);
                speechRecognitionEngine.start();
            }
        }

        function executeVoiceCommands(voicePhrase) {
            const checkPhrase = voicePhrase.toLowerCase().trim();

            if (checkPhrase.includes("open map") || checkPhrase.includes("map view") || checkPhrase.includes("route")) {
                playVocalResponse("Opening Map View.");
                openMapView();
                return;
            }
            if (checkPhrase.includes("close map") || checkPhrase.includes("exit map")) {
                playVocalResponse("Closing Map.");
                closeMapView();
                return;
            }
            if (checkPhrase.includes("blind mode")) {
                triggerProfileMode('blind');
                return;
            }
            if (checkPhrase.includes("deaf mode")) {
                triggerProfileMode('deaf');
                return;
            }
            
            updateLiveTelemetryStatus("Processing phrase data...");
            setTimeout(() => {
                updateLiveTelemetryStatus("System Engine Ready");
                playVocalResponse("Command complete.");
            }, 1000);
        }
    </script>
</body>
</html>
